<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Titolo ottimizzato SEO/GEO (Chiaro per chi cerca su Google) -->
    <title>Abbrivio | Escursioni in Gommone da Terracina per Ponza, Palmarola e Circeo</title>
    
    <!-- Descrizione ottimizzata (È la frase che compare sotto il titolo su Google) -->
    <meta name="description" content="Prenota la tua escursione in gommone da Terracina. Scopri Ponza, Palmarola e il Promontorio del Circeo con Abbrivio: comfort, sicurezza ed esperienze indimenticabili in mare nel Lazio.">
    
    <!-- Keyword locali -->
    <meta name="keywords" content="noleggio gommone Terracina, escursioni Ponza, gita Palmarola, tour Circeo, charter nautico Lazio, gommone experience, Abbrivio">
    <meta name="author" content="Abbrivio" />
    
    <!-- Canonical URL (Migliora il punteggio SEO) -->
    <link rel="canonical" href="https://abbrivio.it/" />

    <!-- Favicon (Sostituisce il logo di Lovable) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph (Per una bella anteprima quando condividi il link su WhatsApp o Facebook) -->
    <meta property="og:title" content="Abbrivio | Escursioni in Gommone da Terracina" />
    <meta property="og:description" content="Scopri le meraviglie di Ponza, Palmarola e del Circeo partendo da Terracina. Prenota la tua Gommone Experience con Abbrivio." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abbrivio.it/" />
    <meta property="og:image" content="https://abbrivio.it/favicon.png" />
    <meta property="og:site_name" content="Abbrivio" />

    <!-- Twitter Card (Anteprima per X/Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abbrivio | Escursioni in Gommone" />
    <meta name="twitter:description" content="Esperienze uniche in gommone verso Ponza, Palmarola e Circeo. Partenze da Terracina." />
    <meta name="twitter:image" content="https://abbrivio.it/favicon.png" />

    <!-- Dati Strutturati JSON-LD per GEO (Il biglietto da visita per le Intelligenze Artificiali) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Abbrivio - Gommone Experience",
      "image": "https://abbrivio.it/favicon.png",
      "description": "Servizio escursioni turistiche in mare e gommone experience con partenza da Terracina verso le Isole Pontine (Ponza, Palmarola) e il Promontorio del Circeo.",
      "url": "https://abbrivio.it",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Terracina",
        "addressRegion": "Lazio",
        "addressCountry": "IT"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "41.2844", 
        "longitude": "13.2486"
      },
      "areaServed": ["Terracina", "Ponza", "Palmarola", "San Felice Circeo"]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
